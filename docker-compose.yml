version: '3.8'

services:
  backend:
    build: ./backend
    depends_on:
      - db

  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: testdb

  nginx:
    image: nginx:latest
    ports:
     - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
     - backend
